name: CI

on:
  pull_request:
    branches: [main]

jobs:
  audit-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Audit — Honesty Ledger exclusions
        run: npm run audit:exclusions

      - name: Audit — unresolved [confirm] placeholders
        run: npm run audit:confirm

      - name: Lighthouse CI budgets
        run: npm run lhci
